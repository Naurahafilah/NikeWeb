<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Nike - Sign In</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">
        <div class="logos">
            <svg viewBox="0 0 24 24" width="40" height="40"><path d="M21.6 4.982c-2.3-1.026-6.148-1.503-9.972-.51-5.183 1.34-9.358 5.446-10.96 10.158-.292.86-.425 1.543-.4 2.054.025.5.21 1.054.66 1.157.388.086.84-.132 1.25-.417.892-.614 2.1-1.897 3.228-3.414.776-1.042 1.536-2.264 2.16-3.486-2.71 2.21-5.61 3.525-8.32 3.633 1.39-1.345 3.328-2.617 5.768-3.666 3.64-1.562 7.82-2.128 11.237-1.42 1.373.28 2.58.747 3.525 1.272.932.518 1.586 1.096 1.824 1.58.07.142.106.27.12.392V4.982z"/></svg>
            <span style="font-size: 24px; font-weight: bold; font-family: sans-serif; letter-spacing: -1px; padding-bottom: 8px;">NIKE</span>
        </div>

        <h1>Enter your email to join us or sign in.</h1>
        <p class="country-text">Indonesia <a href="#">Change</a></p>

        <div class="input-group">
            <input type="email" id="emailInput" placeholder="Email*" required>
        </div>

        <p class="disclaimer">
            By continuing, I agree to Nike's <a href="#">Privacy Policy</a> <br>and <a href="#">Terms of Use</a>.
        </p>

        <div class="button-container">
            <button class="continue-btn" onclick="loginSuccess()">Continue</button>
        </div>
    </div>

    <script>
        function loginSuccess() {
            const email = document.getElementById('emailInput').value;
            if (email) {
                alert(`Welcome back! Logged in as ${email}`);
                window.location.href = 'index.html'; // Pindah ke beranda setelah login
            } else {
                alert('Please enter your email first.');
            }
        }
    </script>

</body>
</html>
